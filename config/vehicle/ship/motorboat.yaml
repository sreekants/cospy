hydrodynamics:
    north: 1
    east: 2
    yaw: 0 
    yaw_ref: 45 
    speed: 5
    speed_ref: 7
    yaw_rate: 0
    dt: 0.0002

# Specification: Recreational — no path following, high momentum (preserves speed),
physics:
    mass: 50000 
    linear_damping_coeff: 500000000
    length: 20
    width: 3
    momentum: 0.92

activity:
    type                : "motorboat" 
    activity            : "recreation" 

maneuverability:
    max_yaw_rate        : 10.0   # degrees per timestep
    max_speed           : 100    # speed per timestep

behavior:
    tss_min_dist     : 800.0  # metres; normal separation inside tss
    tss_angle_tol    : 30.0   # degrees; tolerance before lane correction kicks in

    # overtaking thresholds
    overtake_lat_min : 55.0   # metres; lateral separation while overtaking

    # crossing thresholds
    crossing_aft_min    : 50.0   # metres; crossing at aft of tss vessel
    crossing_fore_min   : 250.0  # metres; crossing in front of approaching tss vessel

    range_visibility    : 100    # range of situations observation
    range_ample_time    : 50     # range of collision avoidance 
    range_safety        : 10     # range for safety maneuvers

devices:
     - name: RADAR
       driver: maritime.regulation.colreg.Evaluator
       args: sample.frequency=1
