hydrodynamics:
    north: 1
    east: 2
    yaw: 0 
    yaw_ref: 45 
    speed: 5
    speed_ref: 7
    yaw_rate: 0
    dt: 0.0002

# Specification: medium momentum, fast heading, crosses TSS perpendicularly.
physics:
    mass: 50000 
    linear_damping_coeff: 500000000
    length: 20
    width: 3
    momentum: 0.75

activity:
    type                : "ferry" 
    activity            : "transport" 

maneuverability:
    max_yaw_rate        : 10.0   # degrees per timestep
    max_speed           : 100    # speed per timestep


behavior:
    # distance thresholds
    tss_min_dist        : 20     # metres; normal separation inside tss
    tss_angle_tol       : 30.0   # degrees; tolerance before lane correction kicks in
    
    # overtaking thresholds
    overtake_lat_min    : 10     # metres; lateral separation while overtaking

    # crossing thresholds
    crossing_aft_min    : 0.50   # kilometres; crossing at aft of tss vessel
    crossing_fore_min   : 0.25   # kilometres; crossing in front of approaching tss vessel

    range_visibility    : 20     # range of situations observation
    range_ample_time    : 10     # range of collision avoidance 
    range_safety        : 5      # range for safety maneuvers

devices:
     - name: RADAR
       driver: maritime.regulation.colreg.Evaluator
       args: sample.frequency=1
